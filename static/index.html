<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Restoran App</title>

</head>
<body>

   <div id="app">
    <h1>Restoran - Upravljanje menijem</h1>

        <li v-for="kategorija in kategorije" :key="kategorija.id">

        </li>
    </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
